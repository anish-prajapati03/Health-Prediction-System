<!doctype html>
<html lang="en">
{% load static %}
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Disease Prediction System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <style>
        /* Navbar hover effect */
        .navbar-nav .nav-link {
            position: relative;
            color: #ffffff;
            transition: color 0.3s ease;
        }

        .navbar-nav .nav-link:hover {
            color: #0d6efd; /* Bootstrap primary color */
        }

        /* Underline animation on hover */
        .navbar-nav .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background-color: #0d6efd;
            transition: width 0.3s ease;
        }

        .navbar-nav .nav-link:hover::after {
            width: 100%;
        }
        .table th {
    background: linear-gradient(135deg, #0d6efd, #6610f2);
    color: white;
    font-weight: bold;
    text-transform: uppercase;
}

.table-hover tbody tr:hover {
    background-color: #eaf4ff;
    transform: scale(1.01);
    transition: all 0.2s ease-in-out;
}
    </style>
  </head>
  <body class="bg-light">


      <!-- Navbar -->
      <div class="row">
        <div class="col-12">
          <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container-fluid">
                  <a class="navbar-brand d-flex align-items-center" href="{% url 'index' %}">
        <img src="{% static 'images/logo.png' %}" alt="Logo" width="40" height="40" class="me-2 rounded-circle">
        
    </a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                  <li class="nav-item">
                    <a class="nav-link active text-white" href="{% url 'index' %}">Home</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'prediction' %}">Disease Prediction</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'history' %}">Medical History</a>
                  </li>
                </ul>
                <form class="d-flex" role="search">
                  <input class="form-control me-2 rounded-pill" type="search" placeholder="Search"/>
                  <button class="btn btn-primary rounded-pill" type="submit">Search</button>
                </form>
              </div>
            </div>
          </nav>
        </div>
      </div>

      <!-- Banner -->
      <div class="row">
        <div class="col-12">
          <img src="{% static 'images/img.jpg'%}" class="img-fluid w-100" style="height:300px; object-fit:cover;"/>
        </div>
      </div>

      <!-- Content -->
      <div class="row">
        <div class="col-12 py-5" style="min-height: 600px; background-color:#f8f9fa;">
            {% block main %}

            {% endblock main %}
          <!-- Placeholder for main content -->
        </div>
      </div>

      <!-- Footer -->
      <div class="row text-white">
        <div class="col-sm-6 bg-dark text-center py-3">
          <h6 class="mb-0">Copyright &copy; DPS</h6>
        </div>
        <div class="col-sm-6 bg-dark text-center py-3">
          <h6 class="mb-0">Developed By : <span class="text-danger">Anish Prajapati</span></h6>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
